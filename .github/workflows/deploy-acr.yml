name: Deploy Docker Image To ACR

on:
  push:
    tags:
      - 'v*'
      - 'deploy'

permissions:
  contents: read

concurrency:
  group: acr-deploy
  cancel-in-progress: false

jobs:
  guard:
    name: Validate Tag Pair
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.check.outputs.should-deploy }}
      version-tag: ${{ steps.check.outputs.version-tag }}
      version-no-v: ${{ steps.check.outputs.version-no-v }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check required tags on the same commit
        id: check
        shell: bash
        run: |
          set -euo pipefail

          git fetch --force --tags

          COMMIT_SHA="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          TAGS_ON_COMMIT="$(git tag --points-at "${COMMIT_SHA}" || true)"

          VERSION_TAG="$(printf '%s\n' "${TAGS_ON_COMMIT}" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$' | head -n 1 || true)"
          HAS_DEPLOY_TAG="$(printf '%s\n' "${TAGS_ON_COMMIT}" | grep -x 'deploy' || true)"

          if [ -n "${VERSION_TAG}" ] && [ -n "${HAS_DEPLOY_TAG}" ]; then
            VERSION_NO_V="${VERSION_TAG#v}"
            echo "should-deploy=true" >> "${GITHUB_OUTPUT}"
            echo "version-tag=${VERSION_TAG}" >> "${GITHUB_OUTPUT}"
            echo "version-no-v=${VERSION_NO_V}" >> "${GITHUB_OUTPUT}"
            echo "Ready to deploy ${VERSION_TAG} from commit ${COMMIT_SHA}."
          else
            echo "should-deploy=false" >> "${GITHUB_OUTPUT}"
            echo "version-tag=" >> "${GITHUB_OUTPUT}"
            echo "version-no-v=" >> "${GITHUB_OUTPUT}"
            echo "Skipping deploy. Commit ${COMMIT_SHA} must include both tags: deploy and vX.X.X"
            echo "Found tags on commit:"
            printf '%s\n' "${TAGS_ON_COMMIT}"
          fi

  deploy:
    name: Build And Push To ACR
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.should-deploy == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.ACR_REPOSITORY }}:${{ needs.guard.outputs.version-tag }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.ACR_REPOSITORY }}:${{ needs.guard.outputs.version-no-v }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.ACR_REPOSITORY }}:latest
